<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfiniteScape | 400 Pemandangan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a2e;
        }

        .header p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .counter {
            background: #1a1a2e;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 10px;
        }

        /* MASONRY GRID */
        .masonry {
            column-count: 4;
            column-gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            break-inside: avoid;
            margin-bottom: 16px;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card img {
            width: 100%;
            height: auto;
            display: block;
            background: #e0e0e0;
        }

        .card-content {
            padding: 10px 12px;
        }

        .card-content span {
            font-size: 0.7rem;
            color: #888;
        }

        /* LOADING INDICATOR */
        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 0.85rem;
        }

        .loading.hide {
            display: none;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 0.7rem;
        }

        @media (max-width: 1000px) {
            .masonry { column-count: 3; }
        }
        @media (max-width: 700px) {
            .masonry { column-count: 2; }
        }
        @media (max-width: 480px) {
            .masonry { column-count: 1; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🏔️ 400 Pemandangan</h1>
    <p>infinite scroll • auto load • gak ada broken image</p>
    <div class="counter" id="counter">📸 0 / 400 foto</div>
</div>

<div class="masonry" id="masonryGrid"></div>
<div class="loading" id="loading">🌀 loading lebih banyak pemandangan...</div>
<footer>scroll terus sampai 400 • alam itu luas</footer>

<script>
    // ========== 400 LINK GAMBAR PEMANDANGAN ==========
    // Gw pake Pexels static links + variasi biar gak monoton
    // Base images from Pexels (free, reliable)
    const baseImages = [
        "https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/772803/pexels-photo-772803.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/1486974/pexels-photo-1486974.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/1543793/pexels-photo-1543793.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/2662116/pexels-photo-2662116.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/325185/pexels-photo-325185.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/532826/pexels-photo-532826.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/449627/pexels-photo-449627.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/1252865/pexels-photo-1252865.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/1586298/pexels-photo-1586298.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/1687845/pexels-photo-1687845.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/1796730/pexels-photo-1796730.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/189349/pexels-photo-189349.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/2082103/pexels-photo-2082103.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/2138922/pexels-photo-2138922.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/2190283/pexels-photo-2190283.jpeg?auto=compress&cs=tinysrgb&w=600",
        "https://images.pexels.com/photos/2356045/pexels-photo-2356045.jpeg?auto=compress&cs=tinysrgb&w=600"
    ];

    // Fallback image (kalo ada yang gagal load)
    const FALLBACK_IMG = "https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=600";
    
    // Judul pemandangan biar gak monoton
    const titles = [
        "Pegunungan", "Pantai", "Hutan", "Danau", "Ngarai", "Air Terjun", "Savana", "Gunung", 
        "Lembah", "Tepi Pantai", "Puncak", "Canyon", "Hutan Pinus", "Teluk", "Pulau", "Gletser",
        "Bukit", "Pedalaman", "Tropis", "Alpine"
    ];

    // ========== LOGIC INFINITE SCROLL ==========
    const TOTAL_IMAGES = 400;
    const BATCH_SIZE = 30; // ambil 30 foto tiap scroll
    let loadedCount = 0;
    let isLoading = false;
    let allImages = [];

    // Generate 400 gambar dari baseImages yang diulang + variasi
    function generateImageList() {
        const images = [];
        for (let i = 0; i < TOTAL_IMAGES; i++) {
            const baseImg = baseImages[i % baseImages.length];
            // Tambahin parameter acak biar gak di-cache terlalu agresif (tapi tetep gambar sama)
            // Ini juga bikin fallback tetep jalan
            images.push({
                url: baseImg,
                title: titles[i % titles.length] + " " + Math.floor(i / titles.length + 1),
                id: i
            });
        }
        return images;
    }

    // Render card ke grid
    function renderCards(startIndex, count) {
        const grid = document.getElementById('masonryGrid');
        const fragment = document.createDocumentFragment();
        
        const endIndex = Math.min(startIndex + count, TOTAL_IMAGES);
        
        for (let i = startIndex; i < endIndex; i++) {
            const img = allImages[i];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${img.url}" loading="lazy" onerror="this.src='${FALLBACK_IMG}'">
                <div class="card-content">
                    <span>📍 ${img.title}</span>
                </div>
            `;
            fragment.appendChild(card);
        }
        
        grid.appendChild(fragment);
        loadedCount = endIndex;
        updateCounter();
    }

    function updateCounter() {
        const counterEl = document.getElementById('counter');
        if (counterEl) {
            counterEl.innerHTML = `📸 ${loadedCount} / ${TOTAL_IMAGES} foto`;
        }
        
        // kalo udah 400, matiin loading indicator
        if (loadedCount >= TOTAL_IMAGES) {
            const loadingEl = document.getElementById('loading');
            if (loadingEl) {
                loadingEl.innerHTML = '✅ 400 foto sudah dimuat semua!';
                loadingEl.classList.remove('hide');
            }
        }
    }

    function loadMore() {
        if (isLoading) return;
        if (loadedCount >= TOTAL_IMAGES) return;
        
        isLoading = true;
        
        // Simulasi delay dikit biar halus (opsional)
        setTimeout(() => {
            const remaining = TOTAL_IMAGES - loadedCount;
            const toLoad = Math.min(BATCH_SIZE, remaining);
            renderCards(loadedCount, toLoad);
            isLoading = false;
            
            // Sembunyiin loading kalo udah abis
            if (loadedCount >= TOTAL_IMAGES) {
                const loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.innerHTML = '✨ 400 pemandangan siap dinikmati ✨';
                }
            }
        }, 200);
    }

    // Infinite scroll detection
    function handleScroll() {
        const scrollY = window.scrollY;
        const windowHeight = window.innerHeight;
        const documentHeight = document.documentElement.scrollHeight;
        
        // Kalo udah mentok 200px dari bawah, load more
        if (scrollY + windowHeight >= documentHeight - 200) {
            loadMore();
        }
    }

    // Init
    allImages = generateImageList();
    renderCards(0, BATCH_SIZE); // load 30 pertama
    
    window.addEventListener('scroll', handleScroll);
    
    // Tambahan: kalo konten masih kurang tinggi, load tambahan
    setTimeout(() => {
        if (document.body.scrollHeight <= window.innerHeight) {
            loadMore();
        }
    }, 500);
</script>

</body>
</html>
