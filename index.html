<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VistaLight | Pemandangan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background: #0a0f1e;
        }

        /* SLIDESHOW PAKE CSS DOANG - RINGAN BANGET */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            animation: fadeEffect 20s infinite;
        }

        /* 10 gambar, masing2 2 detik kliatan + 18 detik fade? Gampangnya pake delay */
        .slide:nth-child(1) { animation-delay: 0s; }
        .slide:nth-child(2) { animation-delay: 2s; }
        .slide:nth-child(3) { animation-delay: 4s; }
        .slide:nth-child(4) { animation-delay: 6s; }
        .slide:nth-child(5) { animation-delay: 8s; }
        .slide:nth-child(6) { animation-delay: 10s; }
        .slide:nth-child(7) { animation-delay: 12s; }
        .slide:nth-child(8) { animation-delay: 14s; }
        .slide:nth-child(9) { animation-delay: 16s; }
        .slide:nth-child(10) { animation-delay: 18s; }

        @keyframes fadeEffect {
            0% { opacity: 0; }
            8% { opacity: 1; }
            17% { opacity: 1; }
            25% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* OVERLAY TIPIS */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
        }

        /* KONTEN - SIMPLE, GA ADA TOMBOL */
        .content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 1rem;
        }

        .card {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 650px;
            width: 100%;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        p {
            font-size: 0.95rem;
            opacity: 0.85;
            line-height: 1.5;
        }

        hr {
            margin: 1rem 0;
            border: 0.5px solid rgba(255,255,255,0.3);
        }

        .mini-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
            font-size: 0.75rem;
            text-align: left;
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.5rem; }
            .card { padding: 1rem; }
            .mini-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="slideshow">
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/772803/pexels-photo-772803.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/1486974/pexels-photo-1486974.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/1543793/pexels-photo-1543793.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/2662116/pexels-photo-2662116.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/325185/pexels-photo-325185.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
    <div class="slide" style="background-image: url('https://images.pexels.com/photos/532826/pexels-photo-532826.jpeg?auto=compress&cs=tinysrgb&w=600');"></div>
</div>
<div class="overlay"></div>

<div class="content">
    <div class="card">
        <h1>✦ VistaLight ✦</h1>
        <p>Keindahan tanpa beban</p>
        <hr>
        <p>Pegunungan • Pantai • Hutan • Danau • Ngarai</p>
        <div class="mini-grid">
            <span>🏔️ Alpen</span>
            <span>🏝️ Maldives</span>
            <span>🍃 Hutan Jepang</span>
            <span>❄️ Norwegia</span>
            <span>🌈 Pelangi Peru</span>
            <span>🌊 Bora Bora</span>
        </div>
        <hr>
        <p style="font-size: 0.7rem;">alam berbicara, diamlah dan nikmati</p>
    </div>
</div>

</body>
</html>
